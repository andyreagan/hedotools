<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>hedotools bundle fixture</title>
    <style>#shift01 { width: 700px; }</style>
</head>
<body>
    <div id="shift01"></div>

    <!-- The single-file drop-in: only global d3 + jquery + topojson are needed;
         the bundle inlines @andyreagan/d3-shifterator and wires hedotools.shifter. -->
    <script src="../../node_modules/d3/dist/d3.min.js"></script>
    <script src="../../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../../node_modules/topojson-client/dist/topojson-client.min.js"></script>
    <script src="../../dist/hedotools-bundle.js"></script>
    <script src="_fixture-data.js"></script>

    <script type="text/javascript">
        // Render a shift through the bundled hedotools.shifter to prove the
        // whole namespace wired up (d3-shifterator inlined -> hedotools.shifter).
        var N = 200;
        var words = hedoTest.words(N), lens = hedoTest.lens(N);
        var refF = hedoTest.freq(7, N), compF = hedoTest.freq(3, N);
        hedotools.shifter.shift(refF, compF, lens, words);
        hedotools.shifter.setfigure(d3.select("#shift01")).setText(["bundle smoke test"]).plot();

        window.__rendered = true;
    </script>
</body>
</html>
