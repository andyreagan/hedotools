<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>hedotools map browser test fixture</title>
    <style>
        /* plot() reads the container's pixel width */
        #map { width: 900px; }
        #shift01 { width: 700px; }
        /* 7-class sequential palette (ColorBrewer YlGnBu) for the q*-8 classes */
        .q0-8 { fill: #ffffcc; }
        .q1-8 { fill: #c7e9b4; }
        .q2-8 { fill: #7fcdbb; }
        .q3-8 { fill: #41b6c4; }
        .q4-8 { fill: #1d91c0; }
        .q5-8 { fill: #225ea8; }
        .q6-8 { fill: #0c2c84; }
    </style>
</head>
<body>
    <div id="map"></div>
    <!-- the state hover handler drives a shift into here -->
    <div id="shift01"></div>

    <script src="../../node_modules/d3/dist/d3.min.js"></script>
    <script src="../../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../../node_modules/topojson-client/dist/topojson-client.min.js"></script>
    <script src="../../node_modules/@andyreagan/d3-shifterator/dist/shifterator.js"></script>
    <script src="../../js/hedotools.init.v4.js"></script>
    <script src="../../js/hedotools.shifter.js"></script>
    <script src="../../js/hedotools.map.js"></script>
    <script src="../data/states-topo.js"></script>
    <script src="_fixture-data.js"></script>

    <script type="text/javascript">
        // Page-level globals the map module + its hover->shift path expect
        // (normally set by maps.html).
        var stateSelType = false; // hovering sets the reference (shiftRef)
        var activeHover = true;   // so hover drives a shift
        var shiftRef = 0, shiftComp = 51; // 51 = the US total; hover sets shiftRef
        // url-encoder stubs (the hover handler calls .varval on the active one)
        var refencoder = { varval: function () { return this; } };
        var compencoder = { varval: function () { return this; } };

        var geoJson = window.usStatesTopo;
        // Names straight from the topojson, so data and features stay aligned.
        var names = geoJson.objects.states.geometries.map(function (g) {
            return g.properties.name;
        });
        var allStateNames = names.slice();

        // LabMT-scale word data so .shift() doesn't under-index (it needs more
        // words than its internal word count). Shared lens/words globals.
        var NWORDS = 200;
        var words = hedoTest.words(NWORDS), lens = hedoTest.lens(NWORDS);
        // 51 states + the US total at index 51, each with a frequency vector.
        var allData = names.map(function (n, i) {
            return { name: n, avhapps: 5.85 + ((i * 7) % 30) / 100, freq: hedoTest.freq(i, NWORDS), rawFreq: hedoTest.freq(i, NWORDS) };
        });
        allData.push({ name: "United States", avhapps: 6.0, freq: hedoTest.freq(99, NWORDS), rawFreq: hedoTest.freq(99, NWORDS) });

        // Accessors return the factory, so call them as separate statements.
        var m = hedotools.map; // invoked singleton
        m.setfigure(d3.select("#map"));
        m.setdata(geoJson);
        m.plot();

        window.__rendered = true;
    </script>
</body>
</html>
